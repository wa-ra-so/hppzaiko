name: "[調査用・一時] 電話番号抽出デバッグ"

# 予約不可の店で電話番号抽出（extractPhone）がほぼ機能していない原因調査用。
# このリポジトリのActionsランナーからでないとhotpepper.jpに実際にアクセスできないため、
# 実HTMLを取得してtel:リンク・JSON-LDまわりの記述を目視確認する。調査後に削除する。
on:
  workflow_dispatch:
    inputs:
      url:
        description: '調査対象の店舗ページURL'
        required: true
        default: 'https://www.hotpepper.jp/strJ000237807/?vos=nhppalsa000016'

jobs:
  fetch-and-dump:
    runs-on: ubuntu-latest
    steps:
      - name: ページを取得してtel関連の記述を出力
        run: |
          node -e "
          fetch('${{ inputs.url }}', {
            headers: { 'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36' },
          }).then(async res => {
            console.log('status:', res.status);
            const html = await res.text();
            console.log('length:', html.length);
            const telHrefIdx = html.search(/href=[\"']tel:/i);
            console.log('tel: href発見位置:', telHrefIdx);
            if (telHrefIdx >= 0) console.log(html.slice(Math.max(0, telHrefIdx - 200), telHrefIdx + 200));
            const telephoneIdx = html.search(/telephone/i);
            console.log('telephone文字列発見位置:', telephoneIdx);
            if (telephoneIdx >= 0) console.log(html.slice(Math.max(0, telephoneIdx - 200), telephoneIdx + 200));
            const denwaIdx = html.search(/電話する/);
            console.log('「電話する」文字列発見位置:', denwaIdx);
            if (denwaIdx >= 0) console.log(html.slice(Math.max(0, denwaIdx - 500), denwaIdx + 500));
            const denwaIdx2 = html.search(/電話でのご予約/);
            console.log('「電話でのご予約」文字列発見位置:', denwaIdx2);
            if (denwaIdx2 >= 0) console.log(html.slice(Math.max(0, denwaIdx2 - 300), denwaIdx2 + 300));
          }).catch(e => console.error('fetch error:', e.message));
          "
