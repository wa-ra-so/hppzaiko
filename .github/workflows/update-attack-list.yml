name: アタックリストの自動更新

on:
  schedule:
    # 1時間おき（1日24回）に実行。予約チェック・解約検出・新規掲載検出のローテーションを
    # 速めるため6回/日から変更（2026-07-18）。公開リポジトリなのでActionsの実行時間自体は
    # 無料だが、無料＝無制限に回してよいという意味ではない。実際に叩いているのは
    # (1)リクルートWebサービスAPI（gourmet/large_area、利用規約上「運用上必要と判断した場合
    # アクセス回数・時間を制限できる」との留保あり）と (2)店舗ページ本体（www.hotpepper.jp、
    # ネット予約チェックのため非公式にスクレイピングしている）の2つで、どちらも上限が
    # 公表されていない＝相手側の裁量で締められるリスクがある。1回の実行は現状20分前後
    # かかっており、1時間おきなら十分な余裕（約3倍）を持って次の実行前に完了する
    - cron: '0 * * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'scripts/hotpepper-roster.mjs'
      - 'scripts/prefectures.mjs'
      - 'scripts/test-data.mjs'
      - 'data/manual-overrides.json'
      - '.github/workflows/update-attack-list.yml'

# 実行間隔を詰めたため、何らかの理由で1回の実行が想定より長引いた場合に次の
# スケジュール実行と重なって同時に data/ を書き込む・pushするのを防ぐ（キューイングする。
# 実行中のジョブを打ち切りはしない＝中途半端な台帳状態でコミットされることを避ける）
concurrency:
  group: update-attack-list
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-roster:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 台帳更新前のデータ監査（前回コミットのdata/が壊れていないか）
      - name: Test data (before)
        run: node scripts/test-data.mjs

      # 4県分を順に更新。1県が失敗しても他県は続行する
      # （HOTPEPPER_API_KEY未設定時はスキップされ、既存data/はそのまま残る）
      - name: Update HotPepper roster (chiba)
        run: node scripts/hotpepper-roster.mjs --pref=chiba || echo "::warning::HotPepper roster update failed (chiba)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Update HotPepper roster (tokyo)
        run: node scripts/hotpepper-roster.mjs --pref=tokyo || echo "::warning::HotPepper roster update failed (tokyo)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Update HotPepper roster (kanagawa)
        run: node scripts/hotpepper-roster.mjs --pref=kanagawa || echo "::warning::HotPepper roster update failed (kanagawa)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Update HotPepper roster (saitama)
        run: node scripts/hotpepper-roster.mjs --pref=saitama || echo "::warning::HotPepper roster update failed (saitama)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      # 更新後のデータ監査。壊れていればコミットしない（安全側に倒れる）
      - name: Test data (after)
        run: node scripts/test-data.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: アタックリストを自動更新 ($(date -u +%Y-%m-%dT%H:%M) UTC)"
            git push
          fi
