<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千葉県 予約不可アタックリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1e293b;--mid:#64748b;--light:#94a3b8;--faint:#e2e8f0;--hairline:#eef2f7;
  --bg:#f4f6fa;--white:#fff;
  --blue:#2563eb;--blue-light:#dbeafe;--blue-pale:#eff6ff;
  --green:#16a34a;--red:#dc2626;--red-pale:#fef2f2;--red-line:#fecaca;
  --radius:10px;
  --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.app{max-width:960px;margin:0 auto;padding:28px 16px 80px;}

.app-header{margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.app-icon{width:42px;height:42px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;}
.app-title{font-size:19px;font-weight:700;letter-spacing:-.02em;}
.app-sub{font-size:11.5px;color:var(--mid);margin-top:2px;}
.header-meta{margin-left:auto;text-align:right;font-size:10.5px;color:var(--light);line-height:1.7;}
.header-meta strong{color:var(--mid);font-weight:600;}
.header-meta a{color:var(--blue);text-decoration:none;font-weight:600;}
.header-meta a:hover{text-decoration:underline;}
.pref-tabs{display:flex;gap:4px;background:var(--white);border:1px solid var(--faint);border-radius:8px;padding:3px;}
.pref-tab{font-size:11.5px;font-weight:600;color:var(--mid);text-decoration:none;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.pref-tab:hover{background:var(--blue-pale);color:var(--blue);}
.pref-tab.active{background:var(--red);color:#fff;}
.view-tabs{display:flex;gap:6px;margin-bottom:14px;}
.view-tab{font-size:12.5px;font-weight:700;color:var(--mid);background:var(--white);border:1.5px solid var(--faint);border-radius:8px;padding:8px 16px;cursor:pointer;font-family:inherit;}
.view-tab:hover{border-color:var(--light);}
.view-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
.view-tab .view-tab-count{font-weight:500;opacity:.85;margin-left:3px;}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:640px){.kpi-row{grid-template-columns:1fr 1fr;}}
.kpi{background:var(--white);border:1px solid var(--faint);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
.kpi-label{font-size:10.5px;font-weight:600;color:var(--mid);}
.kpi-value{font-size:26px;font-weight:600;letter-spacing:-.02em;margin-top:6px;color:var(--ink);}
.kpi-value .unit{font-size:12px;font-weight:500;color:var(--light);margin-left:2px;}
.kpi-note{font-size:10px;color:var(--light);margin-top:2px;}

.filter-card{background:var(--white);border:1px solid var(--faint);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-row input[type=text]{flex:1;min-width:180px;padding:9px 12px;border:1.5px solid var(--faint);border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:var(--white);outline:none;transition:border-color .12s;}
.filter-row input[type=text]:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.chip{padding:5px 11px;border-radius:15px;border:1.5px solid var(--faint);font-size:11px;font-weight:600;color:var(--mid);cursor:pointer;background:var(--white);white-space:nowrap;transition:all .12s;}
.chip:hover{border-color:var(--light);}
.chip.active{background:var(--red);border-color:var(--red);color:white;}
.dd{position:relative;}
.dd summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--mid);background:var(--white);border:1px solid var(--faint);border-radius:8px;padding:6px 10px;user-select:none;white-space:nowrap;}
.dd summary::-webkit-details-marker{display:none;}
.dd summary .dd-val{color:var(--ink);font-weight:700;max-width:130px;overflow:hidden;text-overflow:ellipsis;}
.dd summary.dd-active{border-color:var(--blue);background:var(--blue-pale);}
.dd summary.dd-active .dd-val{color:var(--blue);}
.dd-arrow{font-size:9px;color:var(--light);}
.dd[open] .dd-arrow{transform:rotate(180deg);}
.dd-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:30;background:var(--white);border:1px solid var(--faint);border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.14);padding:10px;display:flex;flex-wrap:wrap;gap:6px;min-width:270px;max-width:min(92vw,560px);max-height:50vh;overflow-y:auto;}
.dd-panel .chip.active{background:var(--blue);border-color:var(--blue);}
.clear-btn{margin-left:auto;font-size:11px;color:var(--light);cursor:pointer;background:none;border:none;font-family:inherit;text-decoration:underline;}
.clear-btn:hover{color:var(--mid);}
.csv-btn{font-size:11.5px;font-weight:600;color:var(--blue);background:var(--blue-pale);border:1px solid var(--blue-light);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.csv-btn:hover{background:var(--blue-light);}

.result-count{font-size:11px;color:var(--mid);margin-bottom:8px;padding-left:2px;}
.list-card{background:var(--white);border:1px solid var(--faint);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.store-row{display:flex;gap:14px;padding:13px 16px;border-bottom:1px solid var(--hairline);}
.store-row:last-child{border-bottom:none;}
.store-row:hover{background:#f8fafc;}
.row-date{flex-shrink:0;width:58px;text-align:center;padding-top:2px;}
.row-date .d-day{font-size:15px;font-weight:700;color:var(--red);font-variant-numeric:tabular-nums;line-height:1.2;}
.row-date .d-mo{font-size:9.5px;color:var(--light);font-weight:600;}
.row-date .d-badge{display:inline-block;margin-top:3px;font-size:8.5px;font-weight:700;color:var(--red);background:var(--red-pale);border:1px solid var(--red-line);border-radius:8px;padding:1px 6px;}
.row-main{flex:1;min-width:0;}
.row-title{font-size:13.5px;font-weight:600;line-height:1.55;}
.row-title a{color:var(--ink);text-decoration:none;}
.row-title a:hover{color:var(--blue);text-decoration:underline;}
.row-addr{font-size:11.5px;color:var(--mid);margin-top:3px;line-height:1.6;}
.tag-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.tag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:9px;}
.tag-area{background:var(--blue-pale);color:var(--blue);border:1px solid var(--blue-light);}
.tag-genre{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0;}
.tag-listed{background:var(--bg);color:var(--mid);border:1px solid var(--faint);font-weight:500;}

.snapshot-details{margin-top:6px;}
.snapshot-details summary{list-style:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--blue);user-select:none;}
.snapshot-details summary::-webkit-details-marker{display:none;}
.snapshot-details summary .toggle-arrow{font-size:8px;color:var(--light);display:inline-block;}
.snapshot-details[open] summary .toggle-arrow{transform:rotate(180deg);}
.snapshot-box{margin-top:6px;padding:8px 10px;background:var(--bg);border:1px solid var(--faint);border-radius:8px;font-size:11px;color:var(--mid);line-height:1.7;}
.snapshot-box .snapshot-row strong{color:var(--ink);font-weight:600;margin-right:4px;}

.empty-state{background:var(--white);border:1px dashed var(--faint);border-radius:var(--radius);padding:40px 20px;text-align:center;color:var(--mid);font-size:13px;line-height:1.8;}
.loading{padding:40px 20px;text-align:center;color:var(--light);font-size:13px;}
.note-card{background:var(--red-pale);border:1px solid var(--red-line);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px;font-size:11.5px;color:#991b1b;line-height:1.7;}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-icon">📞</div>
    <div>
      <div class="app-title" id="pageTitle">予約不可アタックリスト</div>
      <div class="app-sub" id="appSub">ホットペッパーのネット予約カレンダーが使えなくなった店舗。自動更新</div>
    </div>
    <div class="header-meta">
      <div>台帳更新: <strong id="updatedAt">—</strong></div>
    </div>
  </div>
  <div class="pref-tabs" id="prefTabs" style="margin-bottom:14px;display:inline-flex;"></div>
  <div class="view-tabs" id="viewTabs"></div>

  <div id="content"><div class="loading">読み込み中…</div></div>
</div>

<script>
const PREFS = {
  chiba:    { label: '千葉県' },
  tokyo:    { label: '東京都' },
  kanagawa: { label: '神奈川県' },
  saitama:  { label: '埼玉県' },
};
const prefParam = new URLSearchParams(location.search).get('pref');
const PREF_ID = Object.prototype.hasOwnProperty.call(PREFS, prefParam) ? prefParam : 'chiba';
const PREF = PREFS[PREF_ID];

// kind: 'reservation-lost' | 'delisted' | 'newly-listed'。ファイル名は千葉のみ従来URL互換でサフィックス無し
const dataFileName = (kind) => PREF_ID === 'chiba' ? `hotpepper-${kind}.json` : `hotpepper-${kind}-${PREF_ID}.json`;

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = (iso) => (iso || '').slice(0, 10);
const dayMs = 24 * 60 * 60 * 1000;
const strUrl = (it) => it.url || `https://www.hotpepper.jp/str${it.id}/`;

// slug: URLの?view=に使う短縮名（'lost'は従来URL互換のためslug無し＝パラメータ自体を付けない）
const VIEWS = {
  lost: {
    label: '予約不可',
    slug: '',
    dateField: 'reservationLostAt',
    kpiLabel: 'ネット予約不可（累計）',
    subLabel: 'ホットペッパーのネット予約カレンダーが使えなくなった店舗',
    emptyLabel: 'ネット予約不可店',
    csvCols: ['店名', 'ジャンル', 'エリア', '住所', '予約可能を最後に確認した日', '1回目検出日', '2回目確認(確定)日', '同一住所の重複掲載件数', 'ホットペッパーURL'],
    csvRow: (it, n) => [it.name, it.genre, it.area, it.address, fmtDate(it.lastReservableAt), fmtDate(it.reservationSuspectedAt) || fmtDate(it.reservationLostAt), fmtDate(it.reservationLostAt), n, strUrl(it)],
  },
  delisted: {
    label: '解約（掲載終了）',
    slug: 'delisted',
    dateField: 'delistedAt',
    kpiLabel: '解約（累計）',
    subLabel: 'ホットペッパーの掲載自体が終了した店舗（未入金による強制解約なども含む）',
    emptyLabel: '解約店',
    csvCols: ['店名', 'ジャンル', 'エリア', '住所', '最終掲載確認日', '解約検出日', '解約前の予約状況', 'キャッチコピー', '予算', '営業時間', '定休日', 'アクセス', '同一住所の重複掲載件数', 'ホットペッパーURL'],
    csvRow: (it, n) => [it.name, it.genre, it.area, it.address, fmtDate(it.lastSeenAt), fmtDate(it.delistedAt), it.reservationLostAt ? 'ネット予約も不可だった' : '不明', it.catch, it.budget, it.open, it.close, it.access, n, strUrl(it)],
  },
  newlyListed: {
    label: '新規掲載（予約可）',
    slug: 'newly-listed',
    dateField: 'newlyListedAt',
    kpiLabel: '新規掲載（累計）',
    subLabel: 'ホットペッパーに新しく掲載され、ネット予約も使えるようになった店舗',
    emptyLabel: '新規掲載店',
    csvCols: ['店名', 'ジャンル', 'エリア', '住所', '新規掲載検出日', '同一住所の重複掲載件数', 'ホットペッパーURL'],
    csvRow: (it, n) => [it.name, it.genre, it.area, it.address, fmtDate(it.newlyListedAt), n, strUrl(it)],
  },
};
const VIEW_BY_SLUG = Object.fromEntries(Object.entries(VIEWS).filter(([, v]) => v.slug).map(([id, v]) => [v.slug, id]));

const viewParam = new URLSearchParams(location.search).get('view');
const PERIODS = [
  { days: 7,   label: '直近7日' },
  { days: 30,  label: '直近30日' },
  { days: 90,  label: '直近90日' },
  { days: 0,   label: '全期間' },
];
const state = { view: VIEW_BY_SLUG[viewParam] || 'lost', days: 90, area: '', genre: '', q: '' };
let DATA = { lost: null, delisted: null, newlyListed: null };

const viewQuery = (view) => VIEWS[view].slug ? `&view=${VIEWS[view].slug}` : '';
document.getElementById('prefTabs').innerHTML = Object.entries(PREFS).map(([id, p]) =>
  `<a class="pref-tab${id === PREF_ID ? ' active' : ''}" href="?pref=${id}${viewQuery(state.view)}">${p.label}</a>`).join('');

// 台帳更新時刻（リストがいつ更新されたか）はJST（日本時間）の日付+時刻で表示する。
// 各店の検出日（reservationLostAt等）は元々日単位の精度しか無いのでfmtDateのままでよいが、
// 「今このリストがどれだけ新しいか」は分単位まで分かった方が営業が使いやすい
function jstParts(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d)) return null;
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone: 'Asia/Tokyo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false,
  }).formatToParts(d).reduce((acc, p) => { acc[p.type] = p.value; return acc; }, {});
  return parts;
}
const fmtDateTime = (iso) => { const p = jstParts(iso); return p ? `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute}` : ''; };
const fmtTime = (iso) => { const p = jstParts(iso); return p ? `${p.hour}:${p.minute}` : ''; };

function withinDays(iso, days) {
  if (!days) return true;
  const t = Date.parse(iso || 0);
  return Number.isFinite(t) && t >= Date.now() - days * dayMs;
}

function currentData() {
  return DATA[state.view] || { items: [], activeCount: null, updatedAt: '' };
}

function filtered() {
  const data = currentData();
  const dateField = VIEWS[state.view].dateField;
  return data.items.filter(it =>
    withinDays(it[dateField], state.days) &&
    (!state.area || it.area === state.area) &&
    (!state.genre || it.genre === state.genre) &&
    (!state.q || (it.name + it.address).toLowerCase().includes(state.q.toLowerCase()))
  );
}

function ddSummary(label, val) {
  return `<summary class="${val ? 'dd-active' : ''}">${label}: <span class="dd-val">${esc(val || 'すべて')}</span> <span class="dd-arrow">▼</span></summary>`;
}

// 同じ物理店舗がホットペッパー上で複数の店舗ID（表記ゆれ・過去の再登録等）を持っている
// ケースがあり、住所ベースで束ねないと同じ店が何件も営業リードとして重複表示されてしまう。
// 住所文字列の表記ゆれ（全角/半角数字・スペース有無・「丁目」表記）を吸収して同一店舗を判定する。
function normalizeAddress(addr) {
  return String(addr || '')
    .replace(/[\s　]/g, '')
    .replace(/丁目/g, '-')
    .replace(/[－ー―]/g, '-')
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
}

// 期間・エリア等でフィルタ済みのitemsを住所で束ねてグループ化する。
// group.primary は最新の検出日を持つ代表店、group.items は束ねた全件（重複掲載を含む）
function groupByAddress(items, dateField) {
  const map = new Map();
  for (const it of items) {
    const key = normalizeAddress(it.address) || `id:${it.id}`; // 住所が無い場合は束ねない
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(it);
  }
  return [...map.values()].map(members => {
    const sorted = [...members].sort((a, b) => (a[dateField] < b[dateField] ? 1 : -1));
    return { items: sorted, primary: sorted[0], date: sorted[0][dateField] };
  }).sort((a, b) => (a.date < b.date ? 1 : -1));
}

function updateHeaderChrome() {
  const view = VIEWS[state.view];
  document.title = `${PREF.label} ${view.label}アタックリスト`;
  document.getElementById('pageTitle').textContent = `${PREF.label} ${view.label}アタックリスト`;
  document.getElementById('appSub').textContent = `${view.subLabel}。自動更新`;
  document.getElementById('viewTabs').innerHTML = Object.entries(VIEWS).map(([id, v]) => {
    const count = (DATA[id] && DATA[id].items) ? groupByAddress(DATA[id].items, v.dateField).length : null;
    return `<button class="view-tab${id === state.view ? ' active' : ''}" data-view="${id}">${v.label}${count === null ? '' : `<span class="view-tab-count">(${count})</span>`}</button>`;
  }).join('');
  document.querySelectorAll('#viewTabs [data-view]').forEach(b => b.onclick = () => {
    state.view = b.dataset.view;
    Object.assign(state, { days: 90, area: '', genre: '', q: '' });
    const url = new URL(location.href);
    if (VIEWS[state.view].slug) url.searchParams.set('view', VIEWS[state.view].slug); else url.searchParams.delete('view');
    history.replaceState(null, '', url);
    render();
  });
}

function render() {
  const el = document.getElementById('content');
  const data = currentData();
  if (!data) return;
  updateHeaderChrome();
  const view = VIEWS[state.view];
  const dateField = view.dateField;
  const items = filtered();
  const groups = groupByAddress(items, dateField);
  const groupedAll = groupByAddress(data.items, dateField);
  const counts = {
    d7:  groupedAll.filter(g => withinDays(g.date, 7)).length,
    d30: groupedAll.filter(g => withinDays(g.date, 30)).length,
  };
  const areas  = [...new Set(data.items.map(it => it.area).filter(Boolean))].sort();
  const genres = [...new Set(data.items.map(it => it.genre).filter(Boolean))].sort();
  const dupCount = items.length - groups.length;

  el.innerHTML = `
  <div class="kpi-row">
    <div class="kpi"><div class="kpi-label">${view.kpiLabel}</div><div class="kpi-value">${groupedAll.length}<span class="unit">軒</span></div><div class="kpi-note">記録開始以降（同一住所は1軒に集約）</div></div>
    <div class="kpi"><div class="kpi-label">直近30日</div><div class="kpi-value">${counts.d30}<span class="unit">軒</span></div><div class="kpi-note">直近7日: ${counts.d7}軒</div></div>
    <div class="kpi"><div class="kpi-label">HP掲載店数（API）</div><div class="kpi-value">${data.activeCount ?? '—'}<span class="unit">店</span></div><div class="kpi-note">サイト検索の件数とは集計基準が異なります</div></div>
    <div class="kpi"><div class="kpi-label">台帳更新</div><div class="kpi-value" style="font-size:15px;line-height:1.35;padding-top:8px;">${fmtDate(data.updatedAt)}<span class="unit" style="display:block;font-size:13px;margin-left:0;">${fmtTime(data.updatedAt)}</span></div><div class="kpi-note">自動更新</div></div>
  </div>
  <div class="filter-card"><div class="filter-row">
    ${PERIODS.map(p => `<button class="chip ${state.days === p.days ? 'active' : ''}" data-days="${p.days}">${p.label}</button>`).join('')}
    <details class="dd" id="ddArea">${ddSummary('エリア', state.area)}
      <div class="dd-panel"><button class="chip ${!state.area ? 'active' : ''}" data-area="">すべて</button>
      ${areas.map(a => `<button class="chip ${state.area === a ? 'active' : ''}" data-area="${esc(a)}">${esc(a)}</button>`).join('')}</div></details>
    <details class="dd" id="ddGenre">${ddSummary('ジャンル', state.genre)}
      <div class="dd-panel"><button class="chip ${!state.genre ? 'active' : ''}" data-genre="">すべて</button>
      ${genres.map(g => `<button class="chip ${state.genre === g ? 'active' : ''}" data-genre="${esc(g)}">${esc(g)}</button>`).join('')}</div></details>
    <input type="text" id="q" placeholder="店名・住所で検索" value="${esc(state.q)}">
    <button class="csv-btn" id="csvBtn">CSV保存</button>
    <button class="clear-btn" id="clearBtn">クリア</button>
  </div></div>
  <div class="result-count">${groups.length} 軒を表示${dupCount > 0 ? `（同一住所の重複掲載 ${dupCount} 件を集約済み）` : ''}</div>
  ${groups.length === 0
    ? `<div class="empty-state">条件に合う${esc(view.emptyLabel)}はありません。<br>台帳の記録は 2026-07-14 開始で、全店舗を数日かけて順にチェックするため、検出には少し時間がかかります。</div>`
    : `<div class="list-card">${groups.map(ROW_RENDERERS[state.view]).join('')}</div>`}
  `;

  el.querySelectorAll('[data-days]').forEach(b => b.onclick = () => { state.days = +b.dataset.days; render(); });
  el.querySelectorAll('[data-area]').forEach(b => b.onclick = () => { state.area = b.dataset.area; render(); });
  el.querySelectorAll('[data-genre]').forEach(b => b.onclick = () => { state.genre = b.dataset.genre; render(); });
  const q = el.querySelector('#q');
  q.oninput = () => { state.q = q.value; clearTimeout(q._t); q._t = setTimeout(render, 250); };
  q.onkeydown = (e) => { if (e.key === 'Enter') { state.q = q.value; render(); } };
  el.querySelector('#clearBtn').onclick = () => { Object.assign(state, { days: 90, area: '', genre: '', q: '' }); render(); };
  el.querySelector('#csvBtn').onclick = () => downloadCsv(groups);
  // 検索欄はフォーカスを保つ（再描画後）
  if (state.q) { q.focus(); q.setSelectionRange(q.value.length, q.value.length); }
}

// 住所グループに束ねた店（重複掲載）が2件以上あるときの注記行
function dupNote(group) {
  if (group.items.length <= 1) return '';
  const others = group.items.slice(1).map(o => esc(o.name)).join(' / ');
  return `<div class="tag-row"><span class="tag tag-listed">同一住所に${group.items.length}件の掲載（重複掲載の可能性）: ${others}</span></div>`;
}

function rowLost(group) {
  const it = group.primary;
  const d = fmtDate(it.reservationLostAt);
  const suspected = fmtDate(it.reservationSuspectedAt) || d;
  const lastOk = fmtDate(it.lastReservableAt);
  const stillListed = it.lastSeenAt === currentData().updatedAt;
  const rangeLabel = lastOk ? `${lastOk} 〜 ${suspected} の間に変化` : `${suspected} 以前から予約不可`;
  const confirmLabel = suspected === d
    ? (stillListed ? `${d} に確定（1回の確認で確定した記録）` : `${d} に確定（HP掲載終了に伴う即時判定）`)
    : `1回目検出: ${suspected} → 2回連続確認で確定: ${d}`;
  return `<div class="store-row">
    <div class="row-date">
      <div class="d-day">${d.slice(8, 10)}日</div>
      <div class="d-mo">${d.slice(0, 7).replace('-', '/')}</div>
      <div class="d-badge">予約不可確定</div>
    </div>
    <div class="row-main">
      <div class="row-title"><a href="${esc(strUrl(it))}" target="_blank" rel="noopener">${esc(it.name)}</a></div>
      <div class="row-addr">${esc(it.address)}</div>
      <div class="tag-row">
        ${it.area ? `<span class="tag tag-area">${esc(it.area)}</span>` : ''}
        ${it.genre ? `<span class="tag tag-genre">${esc(it.genre)}</span>` : ''}
        <span class="tag tag-listed">${stillListed ? 'HP掲載は継続中（予約のみ不可）' : 'HP掲載自体も終了'}</span>
      </div>
      <div class="tag-row"><span class="tag tag-listed">${rangeLabel}（数日おきのチェックのため正確な日は不明）</span></div>
      <div class="tag-row"><span class="tag tag-listed">${confirmLabel}</span></div>
      ${dupNote(group)}
    </div>
  </div>`;
}

// 解約前に最後に確認できた店舗情報（catch/budget/open/close/access）。ページ自体は
// もう見られないため架電・商談時の参考情報になるが、リストの一覧性を保つため常時表示
// はせず、タップ（<details>）で開くまでは畳んでおく
function delistedSnapshot(it) {
  const rows = [
    it.catch && `<div class="snapshot-row"><strong>キャッチ:</strong> ${esc(it.catch)}</div>`,
    it.budget && `<div class="snapshot-row"><strong>予算:</strong> ${esc(it.budget)}</div>`,
    (it.open || it.close) && `<div class="snapshot-row"><strong>営業時間:</strong> ${esc(it.open || '不明')}${it.close ? ` / 定休日: ${esc(it.close)}` : ''}</div>`,
    it.access && `<div class="snapshot-row"><strong>アクセス:</strong> ${esc(it.access)}</div>`,
  ].filter(Boolean);
  if (rows.length === 0) return '';
  return `<details class="snapshot-details">
    <summary>解約前の店舗情報を見る<span class="toggle-arrow">▼</span></summary>
    <div class="snapshot-box">${rows.join('')}</div>
  </details>`;
}

function rowDelisted(group) {
  const it = group.primary;
  const d = fmtDate(it.delistedAt);
  const lastSeen = fmtDate(it.lastSeenAt);
  const statusTag = it.reservationLostAt ? '解約前からネット予約も不可だった' : '予約状況は不明のまま解約';
  return `<div class="store-row">
    <div class="row-date">
      <div class="d-day">${d.slice(8, 10)}日</div>
      <div class="d-mo">${d.slice(0, 7).replace('-', '/')}</div>
      <div class="d-badge">解約検出</div>
    </div>
    <div class="row-main">
      <div class="row-title"><a href="${esc(strUrl(it))}" target="_blank" rel="noopener">${esc(it.name)}</a></div>
      <div class="row-addr">${esc(it.address)}</div>
      <div class="tag-row">
        ${it.area ? `<span class="tag tag-area">${esc(it.area)}</span>` : ''}
        ${it.genre ? `<span class="tag tag-genre">${esc(it.genre)}</span>` : ''}
        <span class="tag tag-listed">${esc(statusTag)}</span>
      </div>
      <div class="tag-row"><span class="tag tag-listed">最終掲載確認: ${lastSeen} → 解約検出: ${d}（この日付はホットペッパー側の掲載消失に気づいた日です。実際の閉店日ではなく、掲載が閉店後もホットペッパー側にしばらく残っていた場合はそれより前に閉店している可能性があります）</span></div>
      ${delistedSnapshot(it)}
      ${dupNote(group)}
    </div>
  </div>`;
}

function rowNewlyListed(group) {
  const it = group.primary;
  const d = fmtDate(it.newlyListedAt);
  return `<div class="store-row">
    <div class="row-date">
      <div class="d-day">${d.slice(8, 10)}日</div>
      <div class="d-mo">${d.slice(0, 7).replace('-', '/')}</div>
      <div class="d-badge">新規掲載検出</div>
    </div>
    <div class="row-main">
      <div class="row-title"><a href="${esc(strUrl(it))}" target="_blank" rel="noopener">${esc(it.name)}</a></div>
      <div class="row-addr">${esc(it.address)}</div>
      <div class="tag-row">
        ${it.area ? `<span class="tag tag-area">${esc(it.area)}</span>` : ''}
        ${it.genre ? `<span class="tag tag-genre">${esc(it.genre)}</span>` : ''}
        <span class="tag tag-listed">ネット予約可</span>
      </div>
      <div class="tag-row"><span class="tag tag-listed">新規掲載検出: ${d}（全件チェックは実行のたびに走るため、解約検出と違い実際の掲載開始とのズレは運用間隔程度です）</span></div>
      ${dupNote(group)}
    </div>
  </div>`;
}

const ROW_RENDERERS = { lost: rowLost, delisted: rowDelisted, newlyListed: rowNewlyListed };

function downloadCsv(groups) {
  const escCsv = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
  const view = VIEWS[state.view];
  const rows = [view.csvCols.map(escCsv).join(',')].concat(groups.map(g => view.csvRow(g.primary, g.items.length).map(escCsv).join(',')));
  const blob = new Blob(['﻿' + rows.join('\r\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${VIEWS[state.view].slug || 'lost'}-list-${PREF_ID}-${fmtDate(new Date().toISOString())}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function load() {
  const el = document.getElementById('content');
  try {
    const [lostRes, delistedRes, newlyListedRes] = await Promise.all([
      fetch(`./data/${dataFileName('reservation-lost')}`, { cache: 'no-store' }),
      fetch(`./data/${dataFileName('delisted')}`, { cache: 'no-store' }),
      fetch(`./data/${dataFileName('newly-listed')}`, { cache: 'no-store' }),
    ]);
    if (!lostRes.ok) throw new Error(String(lostRes.status));
    DATA.lost = await lostRes.json();
    if (!Array.isArray(DATA.lost.items)) DATA.lost.items = [];
    const fallback = { items: [], updatedAt: DATA.lost.updatedAt, activeCount: DATA.lost.activeCount };
    DATA.delisted = delistedRes.ok ? await delistedRes.json() : fallback;
    if (!Array.isArray(DATA.delisted.items)) DATA.delisted.items = [];
    DATA.newlyListed = newlyListedRes.ok ? await newlyListedRes.json() : fallback;
    if (!Array.isArray(DATA.newlyListed.items)) DATA.newlyListed.items = [];
    document.getElementById('updatedAt').textContent = fmtDateTime(DATA.lost.updatedAt) || '—';
    render();
  } catch {
    el.innerHTML = `<div class="empty-state">${esc(PREF.label)}の掲載台帳はまだありません。<br>
      台帳は自動更新で作成されます（記録開始: 2026-07-15）。</div>`;
  }
}
load();
</script>
</body>
</html>
